name: Release GGR Backend

on:
  workflow_dispatch:
    inputs:
      version:
        description: Backend semantic version (without a v prefix)
        required: true
        type: string
      channel:
        description: Release channel
        required: true
        default: stable
        type: choice
        options: [stable, beta]
  push:
    tags:
      - "ggr-backend-v*"

jobs:
  verify:
    runs-on: macos-15
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @geekgeekrun/sqlite-plugin run build
      - run: pnpm --filter @geekgeekrun/ggr-protocol test
      - run: pnpm --filter @geekgeekrun/ggr-backend test
      - run: pnpm --filter @geekgeekrun/ggrd test

  build:
    needs: verify
    timeout-minutes: 20
    runs-on: macos-15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          architecture: arm64
          cache: pnpm
      - run: pnpm install --no-frozen-lockfile --ignore-scripts
      - run: pnpm --filter @geekgeekrun/sqlite-plugin run build
      - run: cd node_modules/better-sqlite3 && npx node-gyp rebuild
      # Timestamped codesigning makes final release bytes non-reproducible.
      # The signed manifest SHA-256 is the immutable release integrity check.
      - name: Build timestamped signed release artifact
        env:
          GGR_SIGNING_IDENTITY: ${{ secrets.GGR_SIGNING_IDENTITY }}
          GGR_RELEASE_BUILD: '1'
        run: >-
          pnpm build:ggr-backend-artifact -- --version "${{ inputs.version || github.ref_name }}"
          --channel "${{ inputs.channel }}" --codesign-identity "$GGR_SIGNING_IDENTITY"
      - name: Extract and health-check the production artifact
        env:
          VERSION: ${{ inputs.version || github.ref_name }}
          ARCH: arm64
        run: |
          staging="$(mktemp -d)"
          backend_pid=''
          cleanup() {
            [ -z "$backend_pid" ] || kill "$backend_pid" 2>/dev/null || true
            rm -rf "$staging"
          }
          trap cleanup EXIT
          tar -xzf "dist/ggr-backend/$VERSION/ggr-backend-$VERSION-darwin-$ARCH.tar.gz" -C "$staging"
          test -x "$staging/bin/node"
          test -f "$staging/app/server.mjs"
          (cd "$staging" && HOME="$staging/home" ./bin/node app/server.mjs) &
          backend_pid="$!"
          export SOCKET_PATH="$staging/home/.geekgeekrun/run/backend.sock"
          export VERSION
          "$staging/bin/node" --input-type=module <<'NODE'
          import net from 'node:net'
          const requestHealth = () => new Promise((resolve, reject) => {
            const socket = net.createConnection(process.env.SOCKET_PATH)
            let buffer = ''
            socket.once('error', reject)
            socket.on('data', (chunk) => {
              buffer += chunk
              const messages = buffer.split('\n').filter(Boolean)
              if (messages.length < 2) return
              socket.end()
              try { resolve(JSON.parse(messages[1]).result) } catch (error) { reject(error) }
            })
            socket.once('connect', () => socket.write(`${JSON.stringify({ id: 'handshake', method: 'system.handshake', params: { client: 'release-health', clientVersion: '1.0.0', protocolVersion: 1 } })}\n${JSON.stringify({ id: 'health', method: 'system.health', params: {} })}\n`))
          })
          const deadline = Date.now() + 15_000
          let health
          while (Date.now() < deadline) {
            try { health = await requestHealth(); break } catch { await new Promise((resolve) => setTimeout(resolve, 100)) }
          }
          if (!health || health.ready !== true || health.version !== process.env.VERSION || health.protocolVersion !== 1) throw new Error('production artifact failed system.health')
          NODE
      - name: Verify timestamped release artifact digest
        env:
          VERSION: ${{ inputs.version || github.ref_name }}
          ARCH: arm64
        run: |
          node --input-type=module <<'NODE'
          import { createHash } from 'node:crypto'
          import fs from 'node:fs/promises'
          const root = `dist/ggr-backend/${process.env.VERSION}`
          const manifest = JSON.parse(await fs.readFile(`${root}/manifest.json`, 'utf8'))
          const artifact = manifest.artifacts.find((candidate) => candidate.arch === process.env.ARCH)
          if (!artifact) throw new Error('artifact manifest does not describe this build architecture')
          const digest = createHash('sha256').update(await fs.readFile(`${root}/${artifact.filename}`)).digest('hex')
          if (digest !== artifact.sha256) throw new Error('timestamped release artifact digest does not match its manifest')
          NODE
      - name: Build signed standalone Runtime app
        env:
          VERSION: ${{ inputs.version || github.ref_name }}
          ARCH: arm64
          GGR_UPDATE_PRIVATE_KEY: ${{ secrets.GGR_UPDATE_PRIVATE_KEY }}
        run: |
          root="dist/ggr-backend/$VERSION"
          artifact="$root/ggr-backend-$VERSION-darwin-$ARCH.tar.gz"
          node scripts/sign-ggr-backend-manifest.mjs --manifest "$root/manifest.json" --signature "$root/manifest.sig"
          node scripts/build-ggr-runtime-release.mjs \
            --output-dir "dist/ggr-runtime/$VERSION/$ARCH/release" \
            --backend-artifact "$artifact" --manifest "$root/manifest.json" --signature "$root/manifest.sig"
          node scripts/build-ggr-runtime-app.mjs \
            --release-dir "dist/ggr-runtime/$VERSION/$ARCH/release" \
            --output-dir "dist/ggr-runtime/$VERSION/$ARCH/app"
          ditto -c -k --keepParent "dist/ggr-runtime/$VERSION/$ARCH/app/GGR Runtime.app" "dist/ggr-runtime/$VERSION/GGR-Runtime-$VERSION-darwin-$ARCH.app.zip"
      - name: Notarize signed artifact
        env:
          GGR_NOTARY_API_KEY: ${{ secrets.GGR_NOTARY_API_KEY }}
          GGR_NOTARY_KEY_ID: ${{ secrets.GGR_NOTARY_KEY_ID }}
          GGR_NOTARY_ISSUER: ${{ secrets.GGR_NOTARY_ISSUER }}
        run: |
          artifact="dist/ggr-backend/${{ inputs.version || github.ref_name }}/ggr-backend-${{ inputs.version || github.ref_name }}-darwin-arm64.tar.gz"
          umask 077
          ditto -c -k --keepParent "$artifact" "$artifact.zip"
          key="$RUNNER_TEMP/AuthKey_${GGR_NOTARY_KEY_ID}.p8"
          cleanup() { rm -f "$key" "$artifact.zip"; }
          trap cleanup EXIT
          printf '%s' "$GGR_NOTARY_API_KEY" > "$key"
          chmod 600 "$key"
          xcrun notarytool submit "$artifact.zip" --key "$key" --key-id "$GGR_NOTARY_KEY_ID" --issuer "$GGR_NOTARY_ISSUER" --wait
      - uses: actions/upload-artifact@v4
        with:
          name: ggr-backend-arm64
          path: |
            dist/ggr-backend/${{ inputs.version || github.ref_name }}/
            dist/ggr-runtime/${{ inputs.version || github.ref_name }}/GGR-Runtime-${{ inputs.version || github.ref_name }}-darwin-arm64.app.zip
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: downloaded
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Create the final combined manifest once
        run: |
          mkdir release
          find downloaded -name '*.tar.gz' -exec cp {} release/ \;
          find downloaded -name '*.app.zip' -exec cp {} release/ \;
          node --input-type=module <<'NODE'
          import fs from 'node:fs/promises'
          import path from 'node:path'
          const version = process.env.VERSION
          const channel = process.env.CHANNEL
          const roots = await fs.readdir('downloaded', { recursive: true })
          const manifests = await Promise.all(roots.filter((file) => file.endsWith('manifest.json')).map(async (file) => JSON.parse(await fs.readFile(path.join('downloaded', file), 'utf8'))))
          if (manifests.length !== 1) throw new Error('expected one unsigned manifest (arm64)')
          const base = manifests[0]
          const artifacts = manifests.flatMap((manifest) => manifest.artifacts).sort((left, right) => left.arch.localeCompare(right.arch))
          await fs.writeFile('release/manifest.json', `${JSON.stringify({ ...base, version, channel, artifacts }, null, 2)}\n`)
          NODE
        env:
          VERSION: ${{ inputs.version || github.ref_name }}
          CHANNEL: ${{ inputs.channel || 'stable' }}
      - name: Sign final manifest bytes
        env:
          GGR_UPDATE_PRIVATE_KEY: ${{ secrets.GGR_UPDATE_PRIVATE_KEY }}
        run: node scripts/sign-ggr-backend-manifest.mjs --manifest release/manifest.json --signature release/manifest.sig
      - name: Publish versioned release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh release create "ggr-backend-v${{ inputs.version || github.ref_name }}"
          release/ggr-backend-*.tar.gz release/GGR-Runtime-*.app.zip release/manifest.json release/manifest.sig
          --target "${{ github.sha }}" --title "GGR Backend ${{ inputs.version || github.ref_name }}"
          --generate-notes
      - name: Publish the signed selected-channel manifest
        env:
          GH_TOKEN: ${{ github.token }}
          CHANNEL: ${{ inputs.channel }}
          VERSION: ${{ inputs.version || github.ref_name }}
        run: |
          tag="ggrd-$CHANNEL"
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" release/manifest.json release/manifest.sig --clobber
          else
            gh release create "$tag" release/manifest.json release/manifest.sig --target "${{ github.sha }}" --title "GGRD $CHANNEL channel" --notes "Backend channel $CHANNEL now selects $VERSION."
          fi
